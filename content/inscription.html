<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Créer un compte HM MOBILIER." />
  <title>HM MOBILIER | Inscription</title>
  <link rel="stylesheet" href="../style/styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Navigation principale">
      <a class="brand" href="../index.html">HM MOBILIER</a>
      <ul class="nav-links">
        <li><a href="../index.html">Accueil</a></li>
        <li><a href="produits.html">Biens</a></li>
        <li><a href="reservation.html">Réservation</a></li>
        <li id="nav-login-item"><a href="connexion.html">Connexion</a></li>
        <li id="nav-register-item"><a href="inscription.html" class="active">Inscription</a></li>
        <li id="nav-user-item" style="display:none;">
          <span class="user-badge">👤 <span id="nav-username"></span></span>
          <a href="#" id="btn-logout">Déconnexion</a>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="section">
      <div class="section-title">
        <p class="eyebrow">Inscription</p>
        <h2>Créer un compte</h2>
      </div>

      <form id="registerForm" class="form-card" novalidate>
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="exemple@email.com" required />

        <label for="regPassword">Mot de passe</label>
        <input type="password" id="regPassword" placeholder="Minimum 6 caractères, 1 majuscule, 1 chiffre" required />
        <small class="hint">Au moins 6 caractères, une majuscule et un chiffre</small>

        <label for="regConfirm">Confirmer le mot de passe</label>
        <input type="password" id="regConfirm" placeholder="Répéter le mot de passe" required />

        <button type="submit">S'inscrire</button>
        <p id="msgRegister" role="alert"></p>
        <p class="form-link">Déjà un compte ? <a href="connexion.html">Se connecter</a></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 HM MOBILIER. Tous droits réservés.</p>
  </footer>

  <script src="../javascript/app.js"></script>
</body>
</html>
