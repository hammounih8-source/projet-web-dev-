<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Connexion à votre compte HM MOBILIER." />
  <title>HM MOBILIER | Connexion</title>
  <link rel="stylesheet" href="../style/styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Navigation principale">
      <a class="brand" href="../index.html">HM MOBILIER</a>
      <ul class="nav-links">
        <li><a href="../index.html">Accueil</a></li>
        <li><a href="produits.html">Biens</a></li>
        <li><a href="reservation.html">Réservation</a></li>
        <li id="nav-login-item"><a href="connexion.html" class="active">Connexion</a></li>
        <li id="nav-register-item"><a href="inscription.html">Inscription</a></li>
        <li id="nav-user-item" style="display:none;">
          <span class="user-badge">👤 <span id="nav-username"></span></span>
          <a href="#" id="btn-logout">Déconnexion</a>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="section">
      <div class="section-title">
        <p class="eyebrow">Connexion</p>
        <h2>Se connecter</h2>
      </div>

      <form id="loginForm" class="form-card" novalidate>
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="exemple@email.com" required />

        <label for="loginPassword">Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="Votre mot de passe" required />

        <button type="submit">Connexion</button>
        <p id="msgLogin" role="alert"></p>
        <p class="form-link">Pas encore de compte ? <a href="inscription.html">S'inscrire</a></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 HM MOBILIER. Tous droits réservés.</p>
  </footer>

  <script src="../javascript/app.js"></script>
</body>
</html>
